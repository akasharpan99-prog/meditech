<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stylish Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Poppins', sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
      background: url('f.jpg') no-repeat center center/cover;
}

/* Glass effect */
.login-box{
    width:600px;
    padding:60px;
    border-radius:20px;
    background-image: blur;
    
    background: rgba(217, 231, 16, 0);
    box-shadow: 0 8px 32px rgba(204, 109, 109, 0.232);
    text-align:center;
    color:rgb(5, 0, 0);
}

.login-box h2{
    margin-bottom:20px;
}

/* Input fields */
.input-box{
    position:relative;
    margin:15px 0;
}

.input-box input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    outline:none;
    background: rgba(10, 0, 0, 0.873);
    
    color:rgb(242, 232, 232);
    font-size:14px;
}

.input-box input::placeholder{
    color:#e3e8e9;
}

/* Show password icon */
.toggle{
    position:absolute;
    right:10px;
    top:50%;
    transform:translateY(-50%);
    cursor:pointer;
    font-size:14px;
}

/* Button */
button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#ff7eb3;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#ff4e8a;
    transform:scale(1.05);
}

/* Error */
#error{
    margin-top:10px;
    color:#ffb3b3;
}

/* Animation */
.login-box{
    animation:fadeIn 1s ease;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
</style>

</head>
<body>

<div class="login-box">
    <h2>Welcome Back</h2>

    <div class="input-box">
        <input type="text" id="username" placeholder="Username">
    </div>

    <div class="input-box">
        <input type="password" id="password" placeholder="Password">
        <span class="toggle" onclick="togglePassword()">👁️</span>
    </div>

    <button onclick="login()">Login</button>

    <p id="error"></p>
</div>

<script>
function login(){
    let user = document.getElementById("username").value;
    let pass = document.getElementById("password").value;

    if(user === "admin" && pass === "1234"){
        alert("Login Successful 🚀");
    } else {
        document.getElementById("error").innerText = "Invalid Username or Password";
    }
}

function togglePassword(){
    let pass = document.getElementById("password");
    if(pass.type === "password"){
        pass.type = "text";
    } else {
        pass.type = "password";
    }
}
</script>

</body>
</html>
