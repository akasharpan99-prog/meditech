
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    height: 100vh;
    background: url('back.jpg') no-repeat center center/cover;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
}

/* Dark overlay for better readability */
body::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(204, 191, 191, 0.5);
   
}

/* Container stays above overlay */
.container {
    position: relative;
    display: flex;
    width: 850px;
    background: rgba(255,255,255,0.1);
    border-radius: 15px;
    backdrop-filter: blur(15px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    overflow: hidden;
}

/* Left */
.left {
    width: 40%;
    background: rgba(0,0,0,0.3);
    color: white;
    padding: 30px;
}

/* Right */
.right {
    width: 60%;
    padding: 30px;
    color: white;
}

input, textarea {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border: none;
    border-radius: 8px;
    outline: none;
}

button {
    width: 100%;
    padding: 12px;
    border: none;
    background: #ff7eb3;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}

.error { color: #ffb3b3; font-size: 12px; }
.success { text-align: center; color: #b9ffb9; }

/* Responsive */
@media(max-width: 768px){
    .container {
        flex-direction: column;
        width: 90%;
    }
    .left, .right {
        width: 100%;
    }
}
</style>
</head>

<body>

<div class="container">

    <div class="left">
        <h2>Contact Info</h2>
        <p>Feel free to reach out anytime.</p>
        <p>📍 Location: Ayodhya</p>
        <p>📞 Phone: +91 9532942095</p>
        <p>📧 Email: meditech541@shop.com</p>
    </div>

    <div class="right">
        <h2>Contact Us</h2>

        <form id="form">
            <input type="text" id="name" placeholder="Your Name">
            <div class="error" id="nameError"></div>

            <input type="email" id="email" placeholder="Your Email">
            <div class="error" id="emailError"></div>

            <textarea id="message" rows="4" placeholder="Your Message"></textarea>
            <div class="error" id="msgError"></div>

            <button type="submit">Send Message</button>
        </form>

        <div class="success" id="successMsg"></div>
    </div>

</div>

<script>
document.getElementById("form").addEventListener("submit", function(e){
    e.preventDefault();

    let name = document.getElementById("name").value.trim();
    let email = document.getElementById("email").value.trim();
    let msg = document.getElementById("message").value.trim();

    let valid = true;

    document.getElementById("nameError").innerText = "";
    document.getElementById("emailError").innerText = "";
    document.getElementById("msgError").innerText = "";
    document.getElementById("successMsg").innerText = "";

    if(name === ""){
        document.getElementById("nameError").innerText = "Enter your name";
        valid = false;
    }

    if(email === "" || !email.includes("@")){
        document.getElementById("emailError").innerText = "Enter valid email";
        valid = false;
    }

    if(msg === ""){
        document.getElementById("msgError").innerText = "Enter message";
        valid = false;
    }

    if(valid){
        document.getElementById("successMsg").innerText = "Message sent successfully!";
        document.getElementById("form").reset();
    }
});
</script>

</body>
</html>
